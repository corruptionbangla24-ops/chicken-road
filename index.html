<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Infinite Version</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #info { margin-bottom: 10px; font-size: 18px; color: #ffcc00; font-weight: bold; position: fixed; top: 20px; z-index: 100; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }

        /* ভিউপোর্ট - যেখানে গেম দেখা যাবে */
        #viewport { position: relative; width: 300px; height: 450px; background: #333; border: 4px solid #444; overflow: hidden; border-radius: 10px; }

        /* গেম ওয়ার্ল্ড - যা বাম দিকে সরবে */
        #game-world { position: absolute; display: flex; top: 0; left: 0; height: 100%; transition: transform 0.4s ease-out; }
        
        .column { width: 60px; height: 100%; border-right: 1px dashed #555; position: relative; flex-shrink: 0; box-sizing: border-box; }

        /* মুরগি ও গাড়ি */
        #chicken { position: absolute; width: 45px; top: 50%; transform: translateY(-50%); left: 7.5px; z-index: 10; transition: transform 0.2s; }
        .car { position: absolute; width: 55px; height: 85px; top: -100px; z-index: 5; left: 2.5px; }

        /* কন্ট্রোল প্যানেল */
        #controls { width: 300px; background: #222; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 0 0 10px 10px; box-sizing: border-box; margin-top: -4px; z-index: 100; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-go { background: #28a745; color: white; }
        .btn-cash { background: #f3c11a; color: black; }
    </style>
</head>
<body>

    <div id="info">ব্যালেন্স: $<span id="balance">1000.00</span> | লাভ: <span id="mult">1.00</span>x</div>

    <div id="viewport">
        <div id="game-world">
            <!-- মুরগি এই ওয়ার্ল্ডের ভেতরে থাকবে -->
            <img id="chicken" src="chicken.png">
            <!-- কলামগুলো এখানে অটোমেটিক তৈরি হবে -->
        </div>
    </div>

    <div id="controls">
        <button class="btn-cash" onclick="cashOut()">CASH OUT</button>
        <button class="btn-go" onclick="nextStep()">GO</button>
    </div>

    <script>
        let currentStep = -1;
        let multiplier = 1.0;
        let balance = 1000.00;
        let bet = 10;
        let isGameOver = false;
        const maxMultiplier = 20000;

        const world = document.getElementById("game-world");
        const chicken = document.getElementById("chicken");
        const carFiles = ["car1.png", "car2.png", "car3.png"];

        // শুরুতে কিছু কলাম তৈরি করে রাখা
        for (let i = 0; i < 10; i++) {
            createColumn();
        }

        function createColumn() {
            const col = document.createElement("div");
            col.className = "column";
            world.appendChild(col);
        }

        function spawnCar(stepIndex) {
            const car = document.createElement("img");
            const randomCar = carFiles[Math.floor(Math.random() * carFiles.length)];
            car.src = randomCar;
            car.className = "car";
            
            // নির্দিষ্ট কলামের ভেতরে গাড়িটি ঢোকানো
            const targetCol = world.children[stepIndex + 1]; // +1 কারণ chicken একটি এলিমেন্ট
            targetCol.appendChild(car);

            let topPos = -100;
            let speed = 9 + (multiplier / 100); // যেমন এগোবেন গাড়িও তেমন দ্রুত হবে

            let interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                topPos += speed;
                car.style.top = topPos + "px";

                // সংঘর্ষ চেক
                if (currentStep === stepIndex && topPos > 110 && topPos < 210) {
                    isGameOver = true;
                    alert("ওহ না! ২০০০০x এর স্বপ্নে বাধা দিল গাড়ি।");
                    location.reload();
                }

                if (topPos > 500) {
                    car.remove();
                    clearInterval(interval);
                }
            }, 30);
        }

        function nextStep() {
            if (isGameOver || multiplier >= maxMultiplier) return;

            currentStep++;
            
            // আনলিমিটেড কলাম তৈরি
            if (currentStep + 5 >= world.children.length) {
                createColumn();
            }

            // ক্যামেরা স্ক্রলিং (ডান থেকে বামে)
            const offset = currentStep * 60;
            world.style.transform = `translateX(-${offset}px)`;
            
            // মুরগির পজিশন আপডেট (ভিজুয়ালি মুরগি এক জায়গায় থাকবে, কলাম সরবে)
            chicken.style.left = (offset + 7.5) + "px";

            // ওই কলামে গাড়ি নামানো
            spawnCar(currentStep);

            // মাল্টিপ্লায়ার আপডেট
            if (multiplier < maxMultiplier) {
                multiplier += 0.50; 
                document.getElementById("mult").innerText = multiplier.toFixed(2);
            }
        }

        function cashOut() {
            if (currentStep === -1 || isGameOver) return;
            let win = bet * multiplier;
            balance += win;
            document.getElementById("balance").innerText = balance.toFixed(2);
            alert("অভিনন্দন! আপনি জিতেছেন: $" + win.toFixed(2));
            location.reload();
        }
    </script>
</body>
</html>
