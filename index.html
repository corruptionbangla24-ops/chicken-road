 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Pro Edition</title>
    <style>
        :root { --green: #2ecc71; --yellow: #f1c40f; --dark: #1a1a1a; --gray: #333; }
        body { background: #222; color: white; font-family: Arial, sans-serif; margin: 0; overflow: hidden; }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; }
        .balance-box { background: #000; padding: 5px 15px; border-radius: 20px; color: #fff; font-weight: bold; }

        /* গেম এরিয়া */
        .game-view { 
            display: flex; height: 55vh; overflow-x: auto; position: relative; 
            background: #2c3e50; scroll-behavior: smooth; align-items: flex-end;
        }

        .road-column {
            min-width: 140px; height: 100%; border-right: 2px dashed #555;
            position: relative; flex-shrink: 0; background: #34495e;
        }

        .traffic-car { 
            position: absolute; width: 80px; left: 50%; transform: translateX(-50%);
            height: 120px; top: -150px; z-index: 5; object-fit: contain;
            background: rgba(255,0,0,0.2); border-radius: 10px; /* ছবি না থাকলে বক্স দেখাবে */
        }
        
        .barrier-img { 
    position: absolute; 
    width: 100%; 
    height: 60px; 
    top: 45%; 
    left: 0; 
    z-index: 10; 
    display: none; /* শুরুতে লুকানো থাকবে */
    
    /* যদি ছবি লোড না হয় তবে নিচের কালারটি দেখাবে */
    background-color: rgba(243, 156, 18, 0.8); 
    border-top: 4px solid #f39c12;
    border-bottom: 4px solid #f39c12;
}

/* যখন এই ক্লাসটি যোগ হবে তখনই বেরিয়ার দেখা যাবে */
.active-barrier .barrier-img { 
    display: block !important; 
}

        .multiplier-circle {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: #111; border: 2px solid #f1c40f; bottom: 15%; left: 50%;
            transform: translateX(-50%); display: flex; align-items: center;
            justify-content: center; font-weight: bold; color: #f1c40f; font-size: 14px;
        }

        #chicken { 
            position: absolute; width: 60px; bottom: 15%; left: 40px; 
            z-index: 15; transition: all 0.3s ease-out;
        }

        /* কন্ট্রোল প্যানেল */
        .footer { height: 35vh; background: #1a1a1a; padding: 15px; box-sizing: border-box; }
        .bet-buttons { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .bet-btn { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; flex: 1; cursor: pointer; }

        .action-btns { display: flex; gap: 10px; height: 80px; }
        .btn-main { flex: 1; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .cashout { background: var(--yellow); color: #000; }
        .go-btn { background: var(--green); color: #fff; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: #bbb; font-size: 12px;">CHICKEN ROAD PRO</div>
    <div class="balance-box" id="balance">999,994 $</div>
    <div style="font-size: 20px; cursor: pointer;">☰</div>
</div>

<div class="game-view" id="gameView"></div>

<div class="footer">
    <div class="bet-buttons">
        <button class="bet-btn">MIN</button>
        <button class="bet-btn">0.5 $</button>
        <button class="bet-btn">1 $</button>
        <button class="bet-btn">2 $</button>
        <button class="bet-btn">MAX</button>
    </div>
    
    <div class="action-btns">
        <button class="btn-main cashout" id="cashBtn" onclick="cashOut()" disabled>CASH OUT<br><span id="winAmount">0.00 USD</span></button>
        <button class="btn-main go-btn" id="playBtn" onclick="handleGo()">GO</button>
    </div>
</div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const winAmountText = document.getElementById('winAmount');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const totalSteps = 30;

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken" alt="🐔" onerror="this.src='https://flaticon.com'">`;
        
        // পুরাতন ইন্টারভাল পরিষ্কার করা
        carIntervals.forEach(clearInterval);
        carIntervals = [];

        // শুরুর নিরাপদ কলাম
        const startCol = document.createElement('div');
        startCol.className = 'road-column';
        gameView.appendChild(startCol);

        for (let i = 1; i <= totalSteps; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            let mult = (1 + i * 0.15).toFixed(2);
            
            // রেন্ডম গাড়ি ইমেজ সিলেক্ট
            let carNum = Math.floor(Math.random() * 3) + 1;
col.innerHTML = `
    <img src="car${carNum}.png" class="traffic-car" id="car-${i}" alt="🚗" onerror="this.style.background='red'">
    
    <!-- বেরিয়ার ইমেজ এখানে যোগ করা হলো -->
    <img src="barrier.png" class="barrier-img" id="barrier-${i}" onerror="this.style.display='block'; this.style.background='orange';">
    
    <div class="multiplier-circle">${mult}x</div>
`;

            
            gameView.appendChild(col);
            startTraffic(i);
        }
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -(Math.random() * 600 + 200);
        let speed = 3 + (Math.random() * 5);
        let barrierActive = false;

        // ব্যারিয়ার লজিক
        const bInt = setInterval(() => {
            barrierActive = Math.random() > 0.6;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2500);

        // গাড়ি চলার লজিক
        // গাড়ি চলার লজিক (Line 161 - 168)
const cInt = setInterval(() => {
    if(!isPlaying) return;

    // বেরিয়ার সক্রিয় থাকলে এবং গাড়ি বেরিয়ারের কাছে পৌঁছালে সেটি আর নড়বে না
    if (barrierActive && carPos >= 80 && carPos <= 120) {
        carPos = 100; // বেরিয়ারের সামনে গাড়ি লক হয়ে যাবে
    } else {
        carPos += speed;
    }

    if (carPos > gameView.offsetHeight) carPos = -200;
    car.style.top = carPos + 'px';

    // বেরিয়ার থাকলে মুরগি ১০০% নিরাপদ, কোনো চেক হবে না
    if (!barrierActive) {
        checkCollision(id, car, barrierActive);
    }
}, 30);


        carIntervals.push(bInt, cInt);
    }

    function handleGo() {
        if (!isPlaying) {
            isPlaying = true;
            currentStep = 0;
            initBoard();
            cashBtn.disabled = false;
            playBtn.innerText = "JUMP";
            moveChicken(1);
        } else {
            moveChicken(currentStep + 1);
        }
    }

    function moveChicken(id) {
        if(!isPlaying || id > totalSteps) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        
        // মুরগির পজিশন ঠিক করা
        const targetLeft = targetCol.offsetLeft + (targetCol.offsetWidth / 2) - 30;
        
        chicken.style.bottom = "45%"; 
        chicken.style.left = targetLeft + 'px';
        
        setTimeout(() => { chicken.style.bottom = "15%"; }, 200);
        currentStep = id;
        
        let mult = (1 + id * 0.15).toFixed(2);
        winAmountText.innerText = (mult * 1.0).toFixed(2) + " USD"; // ১ ডলার বেট ধরে
        
        // স্ক্রিন অটো স্ক্রল
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
    const chicken = document.getElementById('chicken');
    
    // ১. যদি খেলা না চলে, অথবা মুরগি অন্য কলামে থাকে, তবে চেক করার দরকার নেই
    if(!isPlaying || currentStep !== id) return;

    // ২. সবচেয়ে গুরুত্বপূর্ণ: যদি ব্যারিয়ার সক্রিয় থাকে, তবে গাড়ি মুরগির ক্ষতি করতে পারবে না
    // এখানে return করে দিলে মুরগি নিরাপদ থাকবে
    if (barrierActive) {
        return; 
    }

    const cRect = chicken.getBoundingClientRect();
    const carRect = car.getBoundingClientRect();

    // ৩. কোলিশন লজিক (ব্যারিয়ার না থাকলেই কেবল এটি কাজ করবে)
    if (cRect.left < carRect.right &&
        cRect.right > carRect.left &&
        cRect.top < carRect.bottom &&
        cRect.bottom > carRect.top) {
        gameOver();
    }
}


    function gameOver() {
        isPlaying = false;
        alert("GAME OVER! মুরগিটি দুর্ঘটনার কবলে পড়েছে।");
        location.reload();
    }

    function cashOut() {
        isPlaying = false;
        alert("অভিনন্দন! আপনি জিতেছেন: " + winAmountText.innerText);
        location.reload();
    }

    // পেজ লোড হলে বোর্ড তৈরি হবে
    window.onload = initBoard;

</script>
</body>
</html>
