<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Pro Edition</title>
    <style>
        :root { --green: #2ecc71; --yellow: #f1c40f; --dark: #1a1a1a; --gray: #333; }
        body { background: #222; color: white; font-family: Arial, sans-serif; margin: 0; overflow: hidden; }

        /* হেডার ব্যালেন্স বার */
        .header { background: #111; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; }
        .balance-box { background: #000; padding: 5px 15px; border-radius: 20px; color: #fff; font-weight: bold; }

        /* গেম এরিয়া */
        .game-view { 
            display: flex; height: 55vh; overflow-x: auto; position: relative; 
            background: #444; scroll-behavior: smooth;
        }

        .road-column {
            min-width: 130px; height: 100%; border-right: 2px dashed #666;
            position: relative; flex-shrink: 0;
            background: #333; /* পিচ ঢালা রাস্তা */
        }

        .traffic-car { position: absolute; width: 90%; left: 5%; height: 180px; top: -300px; z-index: 5; object-fit: contain; }
        
        .barrier-img { 
            position: absolute; width: 100%; height: 80px; top: 40%; left: 0; 
            transform: translateY(-50%); opacity: 0; z-index: 10; 
        }
        .active-barrier .barrier-img { opacity: 1; }

        /* মাল্টিপ্লায়ার সার্কেল (মেনহোল ডিজাইন) */
        .multiplier-circle {
            position: absolute; width: 70px; height: 70px; border-radius: 50%;
            background: #222; border: 3px solid #555; bottom: 20%; left: 50%;
            transform: translateX(-50%); display: flex; align-items: center;
            justify-content: center; font-weight: bold; color: #888; font-size: 14px;
        }

        #chicken { 
            position: absolute; width: 70px; bottom: 20%; left: 30px; 
            z-index: 15; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* কন্ট্রোল প্যানেল */
        .footer { height: 35vh; background: #1a1a1a; padding: 15px; box-sizing: border-box; }
        .bet-buttons { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .bet-btn { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; flex: 1; }

        .action-btns { display: flex; gap: 10px; height: 80px; }
        .btn-main { flex: 1; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .cashout { background: var(--yellow); color: #000; }
        .go-btn { background: var(--green); color: #fff; }
        .btn-main:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: #bbb; font-size: 12px;">CHICKEN ROAD</div>
    <div class="balance-box">999 994 $</div>
    <div style="font-size: 20px;">☰</div>
</div>

<div class="game-view" id="gameView"></div>

<div class="footer">
    <div class="bet-buttons">
        <button class="bet-btn">MIN</button>
        <button class="bet-btn">0.5 $</button>
        <button class="bet-btn">1 $</button>
        <button class="bet-btn">2 $</button>
        <button class="bet-btn">MAX</button>
    </div>
    
    <div class="action-btns">
        <button class="btn-main cashout" id="cashBtn" onclick="cashOut()" disabled>CASH OUT<br><span id="winAmount">0.00 USD</span></button>
        <button class="btn-main go-btn" id="playBtn" onclick="handleGo()">GO</button>
    </div>
</div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const winAmountText = document.getElementById('winAmount');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const totalSteps = 30;

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken" alt="🐔">`;
        carIntervals.forEach(clearInterval);
        carIntervals = [];

        // শুরুর নিরাপদ কলাম
        const startCol = document.createElement('div');
        startCol.className = 'road-column';
        gameView.appendChild(startCol);

        for (let i = 1; i <= totalSteps; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            let mult = (1 + i * 0.15).toFixed(2);

            col.innerHTML = `
                <img src="car.png" class="traffic-car" id="car-${i}" onerror="this.style.display='none'">
                <img src="barrier.png" class="barrier-img" id="barrier-${i}" onerror="this.style.background='orange'">
                <div class="multiplier-circle">${mult}x</div>
            `;
            gameView.appendChild(col);
            startTraffic(i);
        }
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -(Math.random() * 500 + 200);
        let speed = 4 + (Math.random() * 4);
        let barrierActive = false;

        const bInt = setInterval(() => {
            if(!isPlaying) return;
            barrierActive = Math.random() > 0.5;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2000);

        const cInt = setInterval(() => {
            if(!isPlaying) return;
            if (barrierActive && carPos >= 60 && carPos <= 100) carPos = 80;
            else carPos += speed;

            if (carPos > gameView.offsetHeight) carPos = -200;
            car.style.top = carPos + 'px';

            checkCollision(id, car, barrierActive);
        }, 30);
        carIntervals.push(bInt, cInt);
    }

    function handleGo() {
        if (!isPlaying) {
            isPlaying = true;
            currentStep = 0;
            initBoard();
            cashBtn.disabled = false;
            moveChicken(1);
        } else {
            moveChicken(currentStep + 1);
        }
    }

    function moveChicken(id) {
        if(!isPlaying || id > totalSteps) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        
        chicken.style.bottom = "40%"; // লাফানোর উচ্চতা
        chicken.style.left = (targetCol.offsetLeft + 30) + 'px';
        
        setTimeout(() => { chicken.style.bottom = "20%"; }, 250);
        currentStep = id;
        
        let mult = (1 + id * 0.15).toFixed(2);
        winAmountText.innerText = (mult * 3).toFixed(2) + " USD"; // ডেমো বেট ৩ ডলার ধরে
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
        const chicken = document.getElementById('chicken');
        if(currentStep !== id || !chicken || barrierActive) return;

        const cRect = chicken.getBoundingClientRect();
        const carRect = car.getBoundingClientRect();

        if (cRect.top < carRect.bottom && cRect.bottom > carRect.top) {
            gameOver(car);
        }
    }

    function gameOver(hitCar) {
        isPlaying = false;
        hitCar.style.top = (document.getElementById('chicken').offsetTop - 50) + "px";
        alert("GAME OVER!");
        location.reload();
    }

    function cashOut() {
        alert("আপনি জিতেছেন: " + winAmountText.innerText);
        location.reload();
    }

    initBoard();
</script>
</body>
</html>
