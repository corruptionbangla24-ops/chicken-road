<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Pro Visuals</title>
    <style>
        body { margin: 0; background-color: #1e1e1e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* হেডার */
        header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #2b2b2b; border-bottom: 2px solid #3a3a3a; z-index: 100; }
        .brand { font-weight: 800; letter-spacing: 0.5px; font-size: 16px; color: #fff; }
        .brand span { color: #e74c3c; }
        .balance-box { background: #3b3b3b; padding: 8px 15px; border-radius: 5px; color: #fff; font-weight: bold; border: 1px solid #555; }

        /* গেম ভিউপোর্ট */
        #viewport { position: relative; width: 360px; flex-grow: 1; background: #333; overflow: hidden; border-left: 2px solid #444; border-right: 2px solid #444; }
        #game-world { position: absolute; display: flex; top: 0; left: 0; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        /* কলাম স্টাইল (স্ক্রিনশটের মতো ডটেড লাইন) */
        .column { width: 70px; height: 100%; border-right: 2px dashed #555; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .first-col { background-color: #2c3e50; border-right: 2px solid #444; } 
        
        /* ম্যানহোল / সার্কেল */
        .manhole { width: 55px; height: 55px; border-radius: 50%; background: radial-gradient(circle, #3e3e3e 30%, #222 100%); border: 3px solid #444; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #888; z-index: 1; box-shadow: inset 0 0 8px #000; }

        /* মুরগি গ্রুপ */
        #chicken-group { 
            position: absolute; 
            width: 60px; 
            top: 50%; 
            transform: translateY(-50%); 
            left: 10px; 
            z-index: 10; 
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        
        /* মুরগির নিচে ছায়া */
        #chicken-shadow {
            position: absolute;
            width: 40px; height: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            bottom: -5px; left: 10px;
            filter: blur(2px);
            z-index: -1;
        }
        
        #chicken-img { width: 100%; animation: idle 2s infinite ease-in-out; position: relative; z-index: 2; }
        
        /* মাল্টিপ্লায়ার ব্যাজ (সবুজ হলে সেফ) */
        #float-badge {
            background: #34495e; color: white; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-align: center; width: 45px; margin: -8px auto 0 auto; position: relative; border: 1px solid #555; box-shadow: 0 3px 6px rgba(0,0,0,0.5); z-index: 5; transition: background 0.3s;
        }

        @keyframes idle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05) translateY(-2px); }
        }

        /* গাড়ি */
        .car { position: absolute; width: 55px; height: 90px; top: -120px; z-index: 5; left: 7.5px; }

        /* ৩ডি ব্যারিয়ার ডিজাইন (পা সহ) */
        .barrier {
            position: absolute;
            width: 70px; 
            height: 18px;
            background: repeating-linear-gradient(
                -45deg,
                #f1c40f,
                #f1c40f 10px,
                #111 10px,
                #111 20px
            );
            border: 2px solid #fff;
            border-radius: 4px;
            top: -45px; /* সার্কেলের উপরে */
            left: -5px;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            display: none;
        }
        /* ব্যারিয়ারের স্ট্যান্ড/পা */
        .barrier::before, .barrier::after {
            content: ''; position: absolute; top: 16px; width: 6px; height: 12px; background: #95a5a6; border: 1px solid #555; border-radius: 0 0 3px 3px;
        }
        .barrier::before { left: 5px; }
        .barrier::after { right: 5px; }

        /* কন্ট্রোল প্যানেল */
        #controls { width: 360px; background: #252525; padding: 15px; box-sizing: border-box; border-top: 2px solid #333; z-index: 100; }
        .preset-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .preset-btn { background: #3a3a3a; border: none; color: #ccc; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .preset-btn.active { background: #555; border: 1px solid #777; color: white; }
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 60px; }
        .btn-cashout { background: #f1c40f; border: none; border-radius: 8px; color: #000; font-weight: 900; font-size: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-go { background: #2ecc71; border: none; border-radius: 8px; color: white; font-weight: 900; font-size: 20px; cursor: pointer; }
        .btn-go:disabled { background: #444; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div class="brand">CHICKEN <span>ROAD</span></div>
        <div class="balance-box">$ <span id="balance">1000.00</span></div>
        <div style="font-size: 20px;">☰</div>
    </header>

    <div id="viewport">
        <div id="game-world">
            <div id="chicken-group">
                <!-- ব্যারিয়ার (উপরে) -->
                <div id="barrier" class="barrier"></div>
                
                <!-- মুরগি এবং ছায়া -->
                <img id="chicken-img" src="chicken.png">
                <div id="chicken-shadow"></div>
                
                <!-- ব্যাজ (নিচে) -->
                <div id="float-badge">1.00x</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <div class="preset-row">
            <button class="preset-btn" onclick="setBet(0.5)">0.5 $</button>
            <button class="preset-btn active" onclick="setBet(1)">1 $</button>
            <button class="preset-btn" onclick="setBet(2)">2 $</button>
            <button class="preset-btn" onclick="setBet(5)">5 $</button>
        </div>
        <div class="main-actions">
            <button id="btn-cashout" class="btn-cashout" onclick="cashOut()" disabled>
                CASH OUT <br><span id="cash-val" style="font-size:11px; font-weight:normal">$ 0.00</span>
            </button>
            <button id="btn-go" class="btn-go" onclick="handleGo()">GO</button>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let currentBet = 1.00;
        let currentStep = 0;
        let currentMultiplier = 1.00;
        let isGameActive = false;
        let isGameOver = false;
        let isWaiting = false;

        const world = document.getElementById("game-world");
        const chickenGroup = document.getElementById("chicken-group");
        const badge = document.getElementById("float-badge");
        const barrier = document.getElementById("barrier");
        const btnGo = document.getElementById("btn-go");
        const btnCash = document.getElementById("btn-cashout");
        const cashVal = document.getElementById("cash-val");
        const balanceDisplay = document.getElementById("balance");

        function initWorld() {
            const existingCols = document.querySelectorAll('.column');
            existingCols.forEach(col => col.remove());

            let firstCol = document.createElement("div");
            firstCol.className = "column first-col";
            world.insertBefore(firstCol, chickenGroup);

            for (let i = 1; i <= 50; i++) {
                let col = document.createElement("div");
                col.className = "column";
                let val = (1 + (i * 0.12)).toFixed(2); 
                col.innerHTML = `<div class="manhole">${val}x</div>`;
                world.appendChild(col);
            }
            
            world.style.transform = `translateX(0px)`;
            chickenGroup.style.left = "5px";
            badge.innerText = "1.00x";
            badge.style.background = "#34495e";
            barrier.style.display = "none";
        }
        
        initWorld();

        function setBet(amount) {
            if (isGameActive) return;
            currentBet = amount;
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(amount)) btn.classList.add('active');
            });
        }

        function handleGo() {
            if (isGameOver) { resetGame(); return; }

            if (isWaiting) {
                removePreviousCar();
                isWaiting = false;
            }

            if (!isGameActive) {
                if (balance < currentBet) { alert("Low Balance!"); return; }
                balance -= currentBet;
                balanceDisplay.innerText = balance.toFixed(2);
                isGameActive = true;
                btnCash.disabled = false;
                btnCash.style.opacity = "1";
                barrier.style.display = "none"; 
                moveChicken();
            } else {
                moveChicken();
            }
        }

        function moveChicken() {
            currentStep++;
            let offset = (currentStep * 70);
            world.style.transform = `translateX(-${offset}px)`;
            chickenGroup.style.left = (offset + 5) + "px";

            // ৮০% সেফ থাকার লজিক
            let isSafe = Math.random() > 0.2; 
            spawnCar(currentStep, isSafe);

            if (isSafe) {
                currentMultiplier = (1 + (currentStep * 0.12)).toFixed(2);
                badge.innerText = currentMultiplier + "x";
                badge.style.background = "#27ae60"; // সেফ হলে সবুজ ব্যাজ
                let winAmount = (currentBet * currentMultiplier).toFixed(2);
                cashVal.innerText = "$ " + winAmount;
            }
        }

        function spawnCar(step, isSafe) {
            const car = document.createElement("img");
            const carId = Math.floor(Math.random() * 3) + 1;
            car.src = `car${carId}.png`;
            car.className = "car";
            
            const cols = document.querySelectorAll('.column');
            if(cols[step]) cols[step].appendChild(car);

            if (isSafe) {
                setTimeout(() => { barrier.style.display = "block"; }, 100);
            } else {
                barrier.style.display = "none";
            }

            let topPos = -120;
            let speed = 15;
            let stopPoint = 80; // ব্যারিয়ারের ঠিক উপরে থামবে

            let interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                
                if (isSafe && topPos >= stopPoint) {
                    clearInterval(interval);
                    isWaiting = true;
                    return;
                }

                topPos += speed;
                car.style.top = topPos + "px";

                // ক্র্যাশ পজিশন
                if (!isSafe && topPos > 180) { 
                    gameOver();
                    clearInterval(interval);
                }
                
                if (topPos > 500) {
                    car.remove();
                    clearInterval(interval);
                }
            }, 20);
            
            car.id = "active-car";
        }

        function removePreviousCar() {
            const oldCar = document.getElementById("active-car");
            if (oldCar) oldCar.remove();
            barrier.style.display = "none";
        }

        function gameOver() {
            isGameOver = true;
            isGameActive = false;
            isWaiting = false;
            badge.style.background = "#e74c3c";
            btnGo.innerText = "RETRY";
            btnGo.style.background = "#e74c3c";
            btnCash.disabled = true;
            btnCash.style.opacity = "0.5";
            barrier.style.display = "none";
            alert("CRASH! Car hit the chicken.");
        }

        function cashOut() {
            if (!isGameActive || isGameOver) return;
            let win = currentBet * currentMultiplier;
            balance += win;
            balanceDisplay.innerText = balance.toFixed(2);
            alert("Success! Won: $" + win.toFixed(2));
            isGameActive = false;
            resetGame();
        }

        function resetGame() {
            isGameOver = false;
            isGameActive = false;
            isWaiting = false;
            currentStep = 0;
            currentMultiplier = 1.00;
            btnGo.innerText = "GO";
            btnGo.style.background = "#2ecc71";
            btnCash.disabled = true;
            btnCash.style.opacity = "0.5";
            cashVal.innerText = "$ 0.00";
            badge.style.background = "#34495e";
            removePreviousCar();
            initWorld();
        }
    </script>
</body>
</html>
