<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Narrow Columns</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #info { margin-bottom: 10px; font-size: 18px; color: #ffcc00; font-weight: bold; }

        /* গেম এরিয়া - চওড়া ৩০০px করা হয়েছে (প্রতি কলাম ৬০px) */
        #game-container { position: relative; width: 300px; height: 450px; background: #333; display: flex; border: 4px solid #444; overflow: hidden; border-radius: 10px; }
        
        .column { flex: 1; border-right: 1px dashed #555; position: relative; }
        .column:last-child { border-right: none; }

        /* মুরগি - কলাম অনুযায়ী সাইজ সমন্বয় */
        #chicken { 
            position: absolute; 
            width: 45px; 
            top: 50%; 
            transform: translateY(-50%);
            left: -60px; 
            transition: left 0.3s ease-out; 
            z-index: 10;
        }

        /* গাড়ি - কলাম অনুযায়ী সাইজ সমন্বয় */
        .car { 
            position: absolute; 
            width: 55px; 
            height: 85px; 
            top: -100px; 
            z-index: 5; 
        }

        /* কন্ট্রোল প্যানেল - চওড়া ৩০০px */
        #controls { width: 300px; background: #222; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 0 0 10px 10px; box-sizing: border-box; }
        button { padding: 18px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-go { background: #28a745; color: white; }
        .btn-cash { background: #f3c11a; color: black; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="info">ব্যালেন্স: $<span id="balance">1000.00</span> | লাভ: <span id="mult">1.00</span>x</div>

    <div id="game-container">
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        
        <img id="chicken" src="chicken.png">
        <div id="cars-container"></div>
    </div>

    <div id="controls">
        <button class="btn-cash" onclick="cashOut()">CASH OUT</button>
        <button class="btn-go" onclick="nextStep()">GO</button>
    </div>

    <script>
        let currentColumn = -1;
        let multiplier = 1.0;
        let balance = 1000.00;
        let isGameOver = false;

        const chicken = document.getElementById("chicken");
        const carContainer = document.getElementById("cars-container");
        const carFiles = ["car1.png", "car2.png", "car3.png"];

        function spawnCar(colIndex) {
            const car = document.createElement("img");
            const randomCar = carFiles[Math.floor(Math.random() * carFiles.length)];
            car.src = randomCar;
            car.className = "car";
            
            // প্রতিটি কলাম ৬০px, গাড়ি ৫৫px, তাই ২.৫px ফাঁকা রেখে মাঝখানে বসানো
            car.style.left = (colIndex * 60 + 2.5) + "px"; 
            carContainer.appendChild(car);

            let topPos = -100;
            let speed = 9; 

            let interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                topPos += speed;
                car.style.top = topPos + "px";

                // কলামের মাঝখানে সংঘর্ষ চেক (উচ্চতা অনুযায়ী)
                if (currentColumn === colIndex && topPos > 110 && topPos < 210) {
                    isGameOver = true;
                    alert("সংঘর্ষ হয়েছে! মুরগিটি চাপা পড়েছে।");
                    location.reload(); 
                }

                if (topPos > 450) {
                    car.remove();
                    clearInterval(interval);
                }
            }, 30);
        }

        function nextStep() {
            if (isGameOver) return;
            currentColumn++;
            
            if (currentColumn >= 5) {
                alert("রাস্তা পার হওয়া সফল!");
                cashOut();
                return;
            }

            // প্রতিটি কলাম ৬০px, মুরগি ৪৫px, তাই ৭.৫px ফাঁকা রেখে মাঝখানে বসানো
            let centerX = (currentColumn * 60) + 7.5; 
            chicken.style.left = centerX + "px";

            spawnCar(currentColumn);

            multiplier += 0.50;
            document.getElementById("mult").innerText = multiplier.toFixed(2);
        }

        function cashOut() {
            if (currentColumn === -1 || isGameOver) return;
            let win = 10 * multiplier;
            balance += win;
            document.getElementById("balance").innerText = balance.toFixed(2);
            alert("জিতেছেন: $" + win.toFixed(2));
            resetRound();
        }

        function resetRound() {
            currentColumn = -1;
            multiplier = 1.0;
            chicken.style.left = "-60px";
            document.getElementById("mult").innerText = "1.00";
            carContainer.innerHTML = "";
        }
    </script>
</body>
</html>
