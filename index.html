<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road Game - Live</title>
    <style>
        :root { --neon-green: #39ff14; --gold: #ffd700; --dark-bg: #0d0f14; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* গেম ভিউ */
        .game-view { 
            display: flex; height: 65vh; overflow-x: auto; position: relative; 
            background: #111; padding-left: 0; scroll-behavior: smooth;
        }

        /* কলাম বা রাস্তা */
        .road-column {
            min-width: 100px; height: 100%; border-right: 2px solid rgba(57, 255, 20, 0.6);
            position: relative; flex-shrink: 0;
            box-shadow: inset -5px 0 15px rgba(57, 255, 20, 0.1);
        }

        /* গাড়ি */
        .traffic-car {
            position: absolute; width: 100%; height: 250px;
            top: -300px; left: 0; z-index: 5; transition: top 0.04s linear;
            object-fit: fill;
        }

        /* ব্যারিয়ার - প্রস্থ ফুল */
        .barrier-img {
            position: absolute; width: 100%; height: 120px;
            top: 50%; left: 0; transform: translateY(-50%);
            opacity: 0; z-index: 10; object-fit: stretch;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-barrier .barrier-img { opacity: 1; }

        /* মুরগি */
        #chicken { 
            position: absolute; width: 80px; bottom: 25px; left: 20px; z-index: 15;
            transition: left 0.5s ease-in-out; filter: drop-shadow(0 0 10px var(--neon-green));
        }

        /* কন্ট্রোল প্যানেল */
        .controls { background: #1c1f26; padding: 15px; height: 35vh; border-top: 3px solid var(--neon-green); box-sizing: border-box; }
        .status-box { text-align: center; color: var(--gold); margin-bottom: 10px; font-weight: bold; }
        .btn-container { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #playBtn { background: var(--neon-green); color: black; }
        #cashBtn { background: #ffc107; color: black; opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="game-view" id="gameView">
        <img src="chicken.png" id="chicken" alt="chicken">
    </div>

    <div class="controls">
        <div class="status-box" id="status">প্লে বাটনে ক্লিক করুন</div>
        <div class="btn-container">
            <button class="btn" id="playBtn" onclick="startGame()">PLAY</button>
            <button class="btn" id="cashBtn" onclick="cashOut()" disabled>CASH OUT</button>
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between; font-size: 14px;">
            <span>ব্যালেন্স: ৳১০০০.০০</span>
            <span id="mult-display" style="color: var(--neon-green);">Multiplier: 1.00x</span>
        </div>
    </div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const statusText = document.getElementById('status');
    const multDisplay = document.getElementById('mult-display');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const carImages = ["car1.png", "car2.png", "car3.png"];

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken">`;
        carIntervals.forEach(clearInterval);
        carIntervals = [];
        
        for (let i = 1; i <= 30; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            col.innerHTML = `
                <img src="${carImages[Math.floor(Math.random() * 3)]}" class="traffic-car" id="car-${i}">
                <img src="barrier.png" class="barrier-img" id="barrier-${i}">
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-weight:bold; color:var(--neon-green);">${(1 + i*0.5).toFixed(2)}x</div>
            `;
            col.onclick = () => moveChicken(i);
            gameView.appendChild(col);
            startTraffic(i);
        }
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -300;
        let speed = 6 + (Math.random() * 6);
        let barrierActive = false;

        setInterval(() => {
            if(!isPlaying) return;
            barrierActive = Math.random() > 0.5;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2500);

        const interval = setInterval(() => {
            if(!isPlaying) return;

            // গাড়ি ব্যারিয়ারের উপরে আটকানোর পজিশন অ্যাডজাস্টমেন্ট
            if (barrierActive && carPos >= 20 && carPos <= 45) { 
                carPos = 35; 
            } else {
                carPos += speed;
            }

            if (carPos > gameView.offsetHeight) {
                carPos = -300;
                car.src = carImages[Math.floor(Math.random() * 3)];
            }

            car.style.top = carPos + 'px';
            checkCollision(id, car, barrierActive);
        }, 30);
        carIntervals.push(interval);
    }

    function startGame() {
        isPlaying = true;
        currentStep = 0;
        initBoard();
        playBtn.disabled = true; playBtn.style.opacity = "0.5";
        cashBtn.disabled = false; cashBtn.style.opacity = "1";
        statusText.innerText = "গেম চলছে! সাবধানে এগোন।";
    }

    function moveChicken(id) {
        if(!isPlaying || id !== currentStep + 1) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        chicken.style.left = (targetCol.offsetLeft + 10) + 'px';
        currentStep = id;
        multDisplay.innerText = `Multiplier: ${(1 + id * 0.5).toFixed(2)}x`;
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
        const chicken = document.getElementById('chicken');
        if(currentStep !== id || !chicken || barrierActive) return;
        const cRect = chicken.getBoundingClientRect();
        const carRect = car.getBoundingClientRect();
        if (cRect.left < carRect.right && cRect.right > carRect.left &&
            cRect.top < carRect.bottom && cRect.bottom > carRect.top) {
            isPlaying = false;
            statusText.innerText = "দুর্ঘটনা! আপনি হেরে গেছেন।";
            setTimeout(() => { alert("গেম ওভার!"); reset(); }, 500);
        }
    }

    function cashOut() {
        if(currentStep > 0) {
            alert(`অভিনন্দন! আপনি ${(1 + currentStep * 0.5).toFixed(2)}x জিতেছেন।`);
            reset();
        }
    }

    function reset() {
        isPlaying = false; currentStep = 0;
        playBtn.disabled = false; playBtn.style.opacity = "1";
        cashBtn.disabled = true; cashBtn.style.opacity = "0.5";
        statusText.innerText = "প্লে বাটনে ক্লিক করুন।";
        initBoard();
    }

    initBoard();
</script>
</body>
</html>
