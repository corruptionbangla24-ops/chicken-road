 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Fixed Animation</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        #info { margin-top: 10px; font-size: 18px; color: #ffcc00; font-weight: bold; }
        #game-container { position: relative; width: 350px; height: 450px; background: #333; display: flex; border: 4px solid #444; margin-top: 20px; overflow: hidden; }
        .column { flex: 1; border-right: 1px dashed #555; position: relative; }
        
        /* মুরগির কন্টেইনার ফিক্স */
        #chicken-box { 
    position: absolute; 
    width: 60px; height: 60px; 
    overflow: hidden; 
    bottom: 30px; 
    left: 10px; 
    transition: left 0.4s ease;
    z-index: 10;
    /* এই অংশগুলো বাদ দিন: mix-blend-mode এবং filter */
}

#chicken-img { 
    position: absolute; 
    width: 480px; height: 60px; 
    left: 0;
    image-rendering: pixelated; 
}

        .car { position: absolute; width: 50px; height: 80px; top: -100px; z-index: 5; }
        #controls { width: 350px; background: #222; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 0 0 10px 10px; box-sizing: border-box; }
        button { padding: 18px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-go { background: #28a745; color: white; }
        .btn-cash { background: #f3c11a; color: black; }
    </style>
</head>
<body>

    <div id="info">ব্যালেন্স: $<span id="balance">1000.00</span> | লাভ: <span id="mult">1.00</span>x</div>

    <div id="game-container">
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        
        <div id="chicken-box">
            <img id="chicken-img" src="chicken.jpg">
        </div>
        <div id="cars-container"></div>
    </div>

    <div id="controls">
        <button class="btn-cash" onclick="cashOut()">CASH OUT</button>
        <button class="btn-go" onclick="nextStep()">GO</button>
    </div>

    <script>
        let currentColumn = -1;
        let multiplier = 1.0;
        let balance = 1000.00;
        let frame = 0;
        let isGameOver = false;

        const chickenBox = document.getElementById("chicken-box");
        const chickenImg = document.getElementById("chicken-img");
        const carContainer = document.getElementById("cars-container");

        // মুরগির অ্যানিমেশন (৮ ফ্রেম)
        function animateChicken() {
            if(!isGameOver){
                frame = (frame + 1) % 8;
                chickenImg.style.left = -(frame * 60) + "px";
            }
        }
        setInterval(animateChicken, 120);

        function spawnCar(colIndex) {
            const car = document.createElement("img");
            car.src = "car1.png"; 
            car.className = "car";
            car.style.left = (colIndex * 70 + 10) + "px"; 
            carContainer.appendChild(car);

            let topPos = -100;
            let interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                topPos += 8;
                car.style.top = topPos + "px";

                // কলিশন চেক
                if (currentColumn === colIndex && topPos > 300 && topPos < 380) {
                    isGameOver = true;
                    alert("ওহ না! মুরগিটি চাপা পড়েছে।");
                    location.reload();
                }
                if (topPos > 450) { car.remove(); clearInterval(interval); }
            }, 30);
        }

        function nextStep() {
            if (isGameOver) return;
            currentColumn++;
            if (currentColumn >= 5) {
                alert("রাস্তা পার হওয়া সফল!");
                cashOut();
                return;
            }
            chickenBox.style.left = (currentColumn * 70 + 5) + "px";
            spawnCar(currentColumn);
            multiplier += 0.50;
            document.getElementById("mult").innerText = multiplier.toFixed(2);
        }

        function cashOut() {
            if (currentColumn === -1 || isGameOver) return;
            let win = 10 * multiplier;
            balance += win;
            document.getElementById("balance").innerText = balance.toFixed(2);
            alert("আপনি জিতেছেন: $" + win.toFixed(2));
            resetRound();
        }

        function resetRound() {
            currentColumn = -1;
            multiplier = 1.0;
            chickenBox.style.left = "10px";
            document.getElementById("mult").innerText = "1.00";
            carContainer.innerHTML = "";
        }
    </script>
</body>
</html>
