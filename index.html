<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Premium</title>
    <style>
        :root { --neon-green: #39ff14; --gold: #ffd700; --dark-bg: #0d0f14; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* গেম এরিয়া */
        .game-view { 
            display: flex; height: 65vh; overflow-x: auto; position: relative; 
            background: #111; padding-left: 0; scroll-behavior: smooth;
        }

        /* কলাম বা রাস্তা */
        .road-column {
            min-width: 100px; height: 100%; border-right: 2px solid rgba(57, 255, 20, 0.6);
            position: relative; flex-shrink: 0;
            box-shadow: inset -5px 0 15px rgba(57, 255, 20, 0.1);
        }

        /* প্রথম কলাম - নিরাপদ জোন */
        .start-zone { background: rgba(57, 255, 20, 0.05); min-width: 110px; }

        /* গাড়িগুলোর স্টাইল - আপনার চাওয়া অনুযায়ী অনেক বড় */
        .traffic-car {
    position: absolute; 
    width: 100%; 
    height: 250px; 
    top: -400px; 
    left: 0;
    z-index: 5; 
    /* transition: top 0.04s linear; <-- এই লাইনটি ডিলিট করে দিন বা মুছে ফেলুন */
    object-fit: fill; 
}


        /* গোপন ব্যারিয়ার - পুরো চওড়া */
        .barrier-img {
            position: absolute; width: 100%; height: 120px;
            top: 50%; left: 0; transform: translateY(-50%);
            opacity: 0; z-index: 10; object-fit: stretch;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-barrier .barrier-img { opacity: 1; }
#chicken { 
    position: absolute; 
    width: 280px;      /* মুরগিটিকে আপনার চাহিদা মতো অনেক বড় করা হয়েছে */
    height: auto;
    bottom: 50px;      /* মাল্টিপ্লায়ার লেখার ঠিক উপরে পজিশন করার জন্য */
    left: 50%;         /* কলামের মাঝখানে নেয়ার প্রথম ধাপ */
    transform: translateX(-50%); /* মুরগিটিকে কলামের একদম সেন্টারে রাখার জন্য */
    z-index: 15;
    transition: left 0.5s ease-in-out; 
    filter: drop-shadow(0 0 15px var(--neon-green));
}

        




        /* কন্ট্রোল প্যানেল */
        .controls { background: #1c1f26; padding: 15px; height: 35vh; border-top: 3px solid var(--neon-green); box-sizing: border-box; }
        .status-box { text-align: center; color: var(--gold); margin-bottom: 10px; font-weight: bold; font-size: 15px; }
        .btn-container { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #playBtn { background: var(--neon-green); color: black; }
        #cashBtn { background: #ffc107; color: black; opacity: 0.5; cursor: not-allowed; }
        
        .info-row { margin-top: 20px; display: flex; justify-content: space-between; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="game-view" id="gameView">
        <!-- জাভাস্ক্রিপ্ট দিয়ে লোড হবে -->
    </div>

    <div class="controls">
        <div class="status-box" id="status">গেম শুরু করতে PLAY বাটনে ক্লিক করুন</div>
        <div class="btn-container">
            <button class="btn" id="playBtn" onclick="startGame()">PLAY</button>
            <button class="btn" id="cashBtn" onclick="cashOut()" disabled>CASH OUT</button>
        </div>
        <div class="info-row">
            <span>ব্যালেন্স: ৳১০০০.০০</span>
            <span id="mult-display" style="color: var(--neon-green);">Multiplier: 1.00x</span>
        </div>
    </div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const statusText = document.getElementById('status');
    const multDisplay = document.getElementById('mult-display');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const carImages = ["car1.png", "car2.png", "car3.png"];
    const totalSteps = 30;

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken" alt="chicken">`;
        carIntervals.forEach(clearInterval);
        carIntervals = [];
        
        // ১. নিরাপদ ঘর তৈরি
        const startCol = document.createElement('div');
        startCol.className = 'road-column start-zone';
        startCol.innerHTML = '<div style="position:absolute; bottom:15px; width:100%; text-align:center; font-size:12px; color:var(--neon-green);">SAFE ZONE</div>';
        gameView.appendChild(startCol);

        // ২. ট্রাফিক কলামগুলো তৈরি
        for (let i = 1; i <= totalSteps; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            
            // শেষ কলাম হলে লাক্সারি কার
            let carImg = (i === totalSteps) ? "luxury-car.png" : carImages[Math.floor(Math.random() * 3)];
            let multiplier = (1 + i * 0.5).toFixed(2);
            if(i === totalSteps) multiplier = "20,000";

            col.innerHTML = `
                <img src="${carImg}" class="traffic-car" id="car-${i}">
                <img src="barrier.png" class="barrier-img" id="barrier-${i}">
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-weight:bold; color:var(--neon-green);">${multiplier}x</div>
            `;
            col.onclick = () => moveChicken(i);
            gameView.appendChild(col);
            startTraffic(i);
        }
        
        // মুরগিকে শুরুতে নিরাপদ ঘরে রাখা
        document.getElementById('chicken').style.left = "15px";
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -350;
        let speed = 5 + (Math.random() * 7);
        let barrierActive = false;

        // গোপন ব্যারিয়ার লজিক
        setInterval(() => {
            if(!isPlaying) return;
            barrierActive = Math.random() > 0.5;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2500);

        const interval = setInterval(() => {
    if(!isPlaying) return;

    if (barrierActive && carPos >= 20 && carPos <= 50) { 
        carPos = 35; 
    } else {
        carPos += speed;
    }

    if (carPos > gameView.offsetHeight) {
        // গাড়ি নিচ থেকে উপরে যাওয়ার সময় যাতে দেখা না যায়
        car.style.transition = "none"; // ট্রানজিশন বন্ধ
        carPos = -400; 
        car.style.top = carPos + 'px';
        
        if(id !== totalSteps) car.src = carImages[Math.floor(Math.random() * 3)];

        // সামান্য সময় পর আবার ট্রানজিশন চালু (যদি প্রয়োজন হয়, তবে আমরা এটি ছাড়াই স্মুথ করতে পারি)
    } else {
        car.style.top = carPos + 'px';
    }

    checkCollision(id, car, barrierActive);
}, 30);

        carIntervals.push(interval);
    }

    function startGame() {
        isPlaying = true;
        currentStep = 0;
        initBoard();
        
        playBtn.disabled = true; playBtn.style.opacity = "0.5";
        cashBtn.disabled = false; cashBtn.style.opacity = "1";
        cashBtn.style.cursor = "pointer";
        statusText.innerText = "গেম চলছে! ব্যারিয়ার দেখে সাবধানে এগোন।";
    }

    function moveChicken(id) {
        if(!isPlaying || id !== currentStep + 1) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        
        // মুরগি লাফ দিবে
        chicken.style.left = (targetCol.offsetLeft + 10) + 'px';
        currentStep = id;
        
        let displayMult = (1 + id * 0.5).toFixed(2);
        if(id === totalSteps) displayMult = "20,000";
        multDisplay.innerText = `Multiplier: ${displayMult}x`;
        
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
        const chicken = document.getElementById('chicken');
        if(currentStep !== id || !chicken || barrierActive) return;

        const cRect = chicken.getBoundingClientRect();
        const carRect = car.getBoundingClientRect();

        if (cRect.left < carRect.right && cRect.right > carRect.left &&
            cRect.top < carRect.bottom && cRect.bottom > carRect.top) {
            isPlaying = false;
            chicken.style.filter = "grayscale(1) brightness(0.5)";
            statusText.innerText = "দুর্ঘটনা! আপনি হেরে গেছেন।";
            setTimeout(() => { alert("ওহ না! আপনার মুরগিটি দুর্ঘটনার কবলে পড়েছে।"); reset(); }, 500);
        }
    }

    function cashOut() {
        if(currentStep > 0) {
            let winAmount = (1 + currentStep * 0.5).toFixed(2);
            if(currentStep === totalSteps) winAmount = "20,000";
            alert(`অভিনন্দন! আপনি ${winAmount}x মাল্টিপ্লায়ারে ক্যাশ আউট করেছেন।`);
            reset();
        } else {
            alert("ক্যাশ আউট করতে অন্তত একটি ধাপ পার হোন!");
        }
    }

    function reset() {
        isPlaying = false;
        currentStep = 0;
        playBtn.disabled = false; playBtn.style.opacity = "1";
        cashBtn.disabled = true; cashBtn.style.opacity = "0.5";
        multDisplay.innerText = "Multiplier: 1.00x";
        statusText.innerText = "আবার শুরু করতে PLAY বাটনে ক্লিক করুন।";
        initBoard();
    }

    initBoard();
</script>
</body>
</html>
