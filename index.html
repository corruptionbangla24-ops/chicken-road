<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Premium</title>
    <style>
        :root { --neon-green: #39ff14; --gold: #ffd700; --dark-bg: #0d0f14; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        /* গেম ভিউ */
        .game-view { 
            display: flex; height: 60vh; overflow-x: auto; position: relative; 
            background: #111; scroll-behavior: smooth; border-bottom: 2px solid #333;
        }

        /* কলাম বা রাস্তা - আপনার নকশা অনুযায়ী */
        .road-column {
            min-width: 120px; height: 100%; border-right: 2px solid rgba(57, 255, 20, 0.3);
            position: relative; flex-shrink: 0; box-sizing: border-box;
        }

        /* গাড়ি - কলামের সমান চওড়া (১০০%) */
        .traffic-car {
            position: absolute; width: 100%; height: 200px; 
            top: -250px; left: 0; z-index: 5; object-fit: fill;
        }

        /* ব্যারিয়ার - আপনার নকশা অনুযায়ী গাড়ির ওপরে */
        .barrier-img {
            position: absolute; width: 100%; height: 100px;
            top: 45%; left: 0; transform: translateY(-50%);
            opacity: 0; z-index: 10; transition: opacity 0.2s ease;
        }
        .active-barrier .barrier-img { opacity: 1; }

        /* মুরগি */
        #chicken { 
            position: absolute; width: 80px; height: auto;
            bottom: 15px; left: 20px; z-index: 15;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), bottom 0.2s ease;
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        /* কন্ট্রোল প্যানেল */
        .controls { background: #1c1f26; padding: 20px; height: 40vh; border-top: 3px solid var(--neon-green); box-sizing: border-box; }
        .status-box { text-align: center; color: var(--gold); margin-bottom: 15px; font-weight: bold; font-size: 18px; min-height: 25px; }
        .btn-container { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #playBtn { background: var(--neon-green); color: black; }
        #cashBtn { background: #ffc107; color: black; }
        #cashBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .info-row { margin-top: 20px; display: flex; justify-content: space-between; font-size: 16px; color: #bbb; }
    </style>
</head>
<body>

    <div class="game-view" id="gameView"></div>

    <div class="controls">
        <div class="status-box" id="status">গেম শুরু করতে PLAY ক্লিক করুন</div>
        <div class="btn-container">
            <button class="btn" id="playBtn" onclick="handleInput()">PLAY</button>
            <button class="btn" id="cashBtn" onclick="cashOut()" disabled>CASH OUT</button>
        </div>
        <div class="info-row">
            <span>ব্যালেন্স: ৳১০০০.০০</span>
            <span id="mult-display" style="color: var(--neon-green);">Multiplier: 1.00x</span>
        </div>
    </div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const statusText = document.getElementById('status');
    const multDisplay = document.getElementById('mult-display');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const totalSteps = 30;

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken" alt="🐔">`;
        carIntervals.forEach(clearInterval);
        carIntervals = [];
        
        // SAFE ZONE
        const startCol = document.createElement('div');
        startCol.className = 'road-column';
        startCol.innerHTML = '<div style="position:absolute; bottom:10px; width:100%; text-align:center; color:var(--neon-green); font-size:12px;">SAFE ZONE</div>';
        gameView.appendChild(startCol);

        // ৩০টি রাস্তা তৈরি
        for (let i = 1; i <= totalSteps; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            let multiplier = (1 + i * 0.5).toFixed(2);
            if(i === totalSteps) multiplier = "20,000";

            col.innerHTML = `
                <img src="car${(i%3)+1}.png" class="traffic-car" id="car-${i}" onerror="this.style.background='red'">
                <img src="barrier.png" class="barrier-img" id="barrier-${i}" onerror="this.style.background='rgba(255,255,255,0.2)'">
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-weight:bold; color:var(--neon-green);">${multiplier}x</div>
            `;
            gameView.appendChild(col);
            startTraffic(i);
        }
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -(Math.random() * 600 + 300);
        let speed = 4 + (Math.random() * 5);
        let barrierActive = false;

        // ব্যারিয়ার লজিক
        const bInterval = setInterval(() => {
            if(!isPlaying) return;
            barrierActive = Math.random() > 0.5;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2500);

        // গাড়ির চলাচল
        const cInterval = setInterval(() => {
            if(!isPlaying) return;

            // ব্যারিয়ারে গাড়ি আটকানোর লজিক
            if (barrierActive && carPos >= 70 && carPos <= 110) {
                carPos = 90; 
            } else {
                carPos += speed;
            }

            if (carPos > gameView.offsetHeight) carPos = -250;
            car.style.top = carPos + 'px';

            checkCollision(id, car, barrierActive);
        }, 30);

        carIntervals.push(bInterval, cInterval);
    }

    function handleInput() {
        if (!isPlaying) {
            startGame();
        } else {
            moveChicken(currentStep + 1);
        }
    }

    function startGame() {
        isPlaying = true;
        currentStep = 0;
        initBoard();
        playBtn.innerText = "JUMP!";
        cashBtn.disabled = false;
        statusText.innerText = "গেম শুরু! রাস্তা পার হোন।";
        setTimeout(() => moveChicken(1), 300);
    }

    function moveChicken(id) {
        if(!isPlaying || id > totalSteps) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        
        // লাফানোর অ্যানিমেশন
        chicken.style.bottom = "100px"; 
        chicken.style.left = (targetCol.offsetLeft + (targetCol.offsetWidth/2) - 40) + 'px';
        
        setTimeout(() => { chicken.style.bottom = "15px"; }, 200);
        currentStep = id;
        
        let mult = (id === totalSteps) ? "20,000" : (1 + id * 0.5).toFixed(2);
        multDisplay.innerText = `Multiplier: ${mult}x`;
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
        const chicken = document.getElementById('chicken');
        // ব্যারিয়ার থাকলে মুরগি গাড়ির নিচ দিয়ে যাবে (নিরাপদ)
        if(currentStep !== id || !chicken || barrierActive) return;

        const cRect = chicken.getBoundingClientRect();
        const carRect = car.getBoundingClientRect();

        // গাড়ি মুরগির গায়ে লাগলে (Padding adjustment)
        if (cRect.top < carRect.bottom && cRect.bottom > carRect.top) {
            handleGameOver(car);
        }
    }

    function handleGameOver(hitCar) {
        isPlaying = false;
        const chicken = document.getElementById('chicken');
        
        // গাড়ি মুরগির একদম ওপর এসে থামা
        hitCar.style.top = (chicken.offsetTop - 80) + "px";
        hitCar.style.zIndex = "100";
        
        carIntervals.forEach(clearInterval);
        chicken.style.filter = "brightness(0.5) sepia(1)";
        
        statusText.innerText = "💥 দুর্ঘটনা! আপনি হেরে গেছেন।";
        statusText.style.color = "red";
        playBtn.innerText = "PLAY AGAIN";
        cashBtn.disabled = true;

        setTimeout(() => { alert("ওহ না! আপনার মুরগিটি দুর্ঘটনার কবলে পড়েছে।"); reset(); }, 400);
    }

    function cashOut() {
        if(currentStep > 0) {
            alert(`অভিনন্দন! আপনি জিতেছেন।`);
            reset();
        }
    }

    function reset() {
        isPlaying = false;
        currentStep = 0;
        playBtn.innerText = "PLAY";
        playBtn.disabled = false;
        cashBtn.disabled = true;
        initBoard();
    }

    initBoard();
</script>
</body>
</html>
