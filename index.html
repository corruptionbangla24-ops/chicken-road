<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Final</title>
    <style>
        :root { --neon-green: #39ff14; --gold: #ffd700; --dark-bg: #0d0f14; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .game-view { 
            display: flex; height: 65vh; overflow-x: auto; position: relative; 
            background: #111; scroll-behavior: smooth; border-bottom: 2px solid #333;
        }

        .road-column {
            min-width: 120px; height: 100%; border-right: 2px solid rgba(57, 255, 20, 0.3);
            position: relative; flex-shrink: 0; box-sizing: border-box;
        }

        /* গাড়ি এখন কলামের সমান চওড়া */
        .traffic-car {
            position: absolute; width: 100%; height: 220px; 
            top: -300px; left: 0; z-index: 5; object-fit: fill;
        }

        /* ব্যারিয়ারের পজিশন গাড়ির ওপরে */
        .barrier-img {
            position: absolute; width: 100%; height: 100px;
            top: 50%; left: 0; transform: translateY(-50%);
            opacity: 0; z-index: 10; transition: opacity 0.2s;
        }
        .active-barrier .barrier-img { opacity: 1; }

        #chicken { 
            position: absolute; width: 90px; height: auto;
            bottom: 15px; left: 15px; z-index: 15;
            transition: left 0.4s ease, bottom 0.2s ease;
        }

        .controls { background: #1c1f26; padding: 15px; height: 35vh; border-top: 3px solid var(--neon-green); }
        .status-box { text-align: center; color: var(--gold); margin-bottom: 10px; font-weight: bold; font-size: 18px; }
        .btn-container { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #playBtn { background: var(--neon-green); color: black; }
        #cashBtn { background: #ffc107; color: black; }
        #cashBtn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="game-view" id="gameView"></div>

    <div class="controls">
        <div class="status-box" id="status">গেম শুরু করতে PLAY ক্লিক করুন</div>
        <div class="btn-container">
            <button class="btn" id="playBtn" onclick="handleInput()">PLAY</button>
            <button class="btn" id="cashBtn" onclick="cashOut()" disabled>CASH OUT</button>
        </div>
        <div class="info-row" style="display:flex; justify-content:space-between; padding:10px;">
            <span id="balance">ব্যালেন্স: ৳১০০০</span>
            <span id="mult-display" style="color:var(--neon-green)">Multiplier: 1.00x</span>
        </div>
    </div>

<script>
    const gameView = document.getElementById('gameView');
    const playBtn = document.getElementById('playBtn');
    const cashBtn = document.getElementById('cashBtn');
    const statusText = document.getElementById('status');
    const multDisplay = document.getElementById('mult-display');

    let currentStep = 0;
    let isPlaying = false;
    let carIntervals = [];
    const totalSteps = 30;

    function initBoard() {
        gameView.innerHTML = `<img src="chicken.png" id="chicken" alt="🐔">`;
        carIntervals.forEach(clearInterval);
        carIntervals = [];
        
        // SAFE ZONE
        const startCol = document.createElement('div');
        startCol.className = 'road-column';
        startCol.innerHTML = '<div style="position:absolute; bottom:10px; width:100%; text-align:center; color:var(--neon-green); font-size:12px;">SAFE</div>';
        gameView.appendChild(startCol);

        for (let i = 1; i <= totalSteps; i++) {
            const col = document.createElement('div');
            col.className = 'road-column';
            col.id = `col-${i}`;
            let mult = (1 + i * 0.5).toFixed(2);
            col.innerHTML = `
                <img src="car${(i%3)+1}.png" class="traffic-car" id="car-${i}" onerror="this.style.background='red'">
                <img src="barrier.png" class="barrier-img" id="barrier-${i}" onerror="this.style.background='rgba(255,255,255,0.2)'">
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-weight:bold; color:var(--neon-green);">${mult}x</div>
            `;
            gameView.appendChild(col);
            startTraffic(i);
        }
    }

    function startTraffic(id) {
        const col = document.getElementById(`col-${id}`);
        const car = document.getElementById(`car-${id}`);
        let carPos = -(Math.random() * 600 + 200);
        let speed = 5 + (Math.random() * 5);
        let barrierActive = false;

        // ব্যারিয়ার টাইমার
        const bInt = setInterval(() => {
            if(!isPlaying) return;
            barrierActive = Math.random() > 0.5;
            if(barrierActive) col.classList.add('active-barrier');
            else col.classList.remove('active-barrier');
        }, 2000);

        // গাড়ির চলাচল
        const cInt = setInterval(() => {
            if(!isPlaying) return;

            // ব্যারিয়ারে গাড়ি আটকানোর নিখুঁত লজিক (আপনার ড্রয়িং অনুযায়ী)
            if (barrierActive && carPos >= 80 && carPos <= 120) {
                carPos = 100; 
            } else {
                carPos += speed;
            }

            if (carPos > gameView.offsetHeight) carPos = -250;
            car.style.top = carPos + 'px';

            checkCollision(id, car, barrierActive);
        }, 30);

        carIntervals.push(bInt, cInt);
    }

    function handleInput() {
        if (!isPlaying) {
            startGame();
        } else {
            moveChicken(currentStep + 1);
        }
    }

    function startGame() {
        isPlaying = true;
        currentStep = 0;
        initBoard();
        playBtn.innerText = "JUMP! 🐔";
        cashBtn.disabled = false;
        statusText.innerText = "রাস্তা পার হোন!";
        setTimeout(() => moveChicken(1), 300);
    }

    function moveChicken(id) {
        if(!isPlaying || id > totalSteps) return;
        const chicken = document.getElementById('chicken');
        const targetCol = document.getElementById(`col-${id}`);
        
        chicken.style.bottom = "100px"; // লাফ
        chicken.style.left = (targetCol.offsetLeft + 15) + 'px';
        
        setTimeout(() => { chicken.style.bottom = "15px"; }, 200);
        currentStep = id;
        
        multDisplay.innerText = `Multiplier: ${(1 + id * 0.5).toFixed(2)}x`;
        gameView.scrollTo({ left: targetCol.offsetLeft - 100, behavior: 'smooth' });
    }

    function checkCollision(id, car, barrierActive) {
        const chicken = document.getElementById('chicken');
        // ব্যারিয়ার থাকলে মুরগি গাড়ির নিচ দিয়ে যাবে (Safe)
        if(currentStep !== id || !chicken || barrierActive) return;

        const cRect = chicken.getBoundingClientRect();
        const carRect = car.getBoundingClientRect();

        // গাড়ি মুরগির গায়ে লাগলে (Hitbox)
        if (cRect.top < carRect.bottom && cRect.bottom > carRect.top) {
            gameOver(car);
        }
    }

    function gameOver(hitCar) {
        isPlaying = false;
        carIntervals.forEach(clearInterval);
        
        const chicken = document.getElementById('chicken');
        // গাড়িকে মুরগির গায়ের ওপর আটকে দেওয়া
        hitCar.style.top = (chicken.offsetTop - 100) + "px";
        hitCar.style.zIndex = "100";
        chicken.style.filter = "brightness(0.5) sepia(1)";
        
        statusText.innerText = "💥 দুর্ঘটনা! আপনি হেরে গেছেন।";
        playBtn.innerText = "RESTART";
        cashBtn.disabled = true;

        setTimeout(() => { alert("গাড়ি চাপা পড়েছেন! আবার চেষ্টা করুন।"); }, 200);
    }

    function cashOut() {
        if(currentStep > 0) {
            alert(`অভিনন্দন! আপনি জিতলেন।`);
            isPlaying = false;
            initBoard();
        }
    }

    initBoard();
</script>
</body>
</html>
