<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Final Pro</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #info { margin-bottom: 10px; font-size: 18px; color: #ffcc00; font-weight: bold; }

        /* গেম এরিয়া (৫টি কলাম) */
        #game-container { position: relative; width: 350px; height: 450px; background: #333; display: flex; border: 4px solid #444; overflow: hidden; border-radius: 10px; }
        
        .column { flex: 1; border-right: 1px dashed #555; position: relative; }
        .column:last-child { border-right: none; }

        /* মাঝখানের সংঘর্ষ রেখা (ঐচ্ছিক, আপনার ড্রয়িং অনুযায়ী বোঝানোর জন্য) */
        .middle-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.1); }

        /* মুরগি - একদম কলামের মাঝখানে থাকবে */
        #chicken { 
            position: absolute; 
            width: 50px; 
            top: 50%; /* কলামের মাঝামাঝি উচ্চতায় */
            transform: translateY(-50%);
            left: -80px; 
            transition: left 0.3s ease-out; 
            z-index: 10;
        }

        /* গাড়ি */
        .car { 
            position: absolute; 
            width: 60px; 
            height: 90px; 
            top: -100px; 
            z-index: 5; 
        }

        /* কন্ট্রোল প্যানেল */
        #controls { width: 350px; background: #222; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 0 0 10px 10px; box-sizing: border-box; }
        button { padding: 18px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-go { background: #28a745; color: white; }
        .btn-cash { background: #f3c11a; color: black; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="info">ব্যালেন্স: $<span id="balance">1000.00</span> | লাভ: <span id="mult">1.00</span>x</div>

    <div id="game-container">
        <div class="middle-line"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
        <div class="column)./div>
        <div class="column"></div>
        
        <img id="chicken" src="chicken.png">
        <div id="cars-container"></div>
    </div>

    <div id="controls">
        <button class="btn-cash" onclick="cashOut()">CASH OUT</button>
        <button class="btn-go" onclick="nextStep()">GO</button>
    </div>

    <script>
        let currentColumn = -1;
        let multiplier = 1.0;
        let balance = 1000.00;
        let isGameOver = false;

        const chicken = document.getElementById("chicken");
        const carContainer = document.getElementById("cars-container");
        const carFiles = ["car1.png", "car2.png", "car3.png"];

        function spawnCar(colIndex) {
            const car = document.createElement("img");
            const randomCar = carFiles[Math.floor(Math.random() * carFiles.length)];
            car.src = randomCar;
            car.className = "car";
            car.style.left = (colIndex * 70 + 5) + "px"; 
            carContainer.appendChild(car);

            let topPos = -100;
            let speed = 9; // গাড়ি একটু দ্রুত নামবে সংঘর্ষের জন্য

            let interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                topPos += speed;
                car.style.top = topPos + "px";

                // আপনার ড্রয়িং অনুযায়ী কলামের ঠিক মাঝামাঝি উচ্চতায় সংঘর্ষ চেক
                // যেহেতু মুরগি মাঝখানে (top: 200px), তাই গাড়ি ১১০ থেকে ২১০ এর মধ্যে আসলে ধাক্কা লাগবে
                if (currentColumn === colIndex && topPos > 110 && topPos < 210) {
                    isGameOver = true;
                    alert("সংঘর্ষ হয়েছে! মুরগিটি মাঝপথে চাপা পড়েছে।");
                    location.reload(); 
                }

                if (topPos > 450) {
                    car.remove();
                    clearInterval(interval);
                }
            }, 30);
        }

        function nextStep() {
            if (isGameOver) return;
            currentColumn++;
            
            if (currentColumn >= 5) {
                alert("রাস্তা পার হওয়া সফল!");
                cashOut();
                return;
            }

            // মুরগি কলামের মাঝখানে পজিশন নেওয়া
            let centerX = (currentColumn * 70) + 10; 
            chicken.style.left = centerX + "px";

            spawnCar(currentColumn);

            multiplier += 0.50;
            document.getElementById("mult").innerText = multiplier.toFixed(2);
        }

        function cashOut() {
            if (currentColumn === -1 || isGameOver) return;
            let win = 10 * multiplier;
            balance += win;
            document.getElementById("money").innerText = balance.toFixed(2);
            alert("জিতেছেন: $" + win.toFixed(2));
            resetRound();
        }

        function resetRound() {
            currentColumn = -1;
            multiplier = 1.0;
            chicken.style.left = "-80px";
            document.getElementById("mult").innerText = "1.00";
            carContainer.innerHTML = "";
        }
    </script>
</body>
</html>
